<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Global Emotional Intelligence Test - Part 1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    @media print {
      body { background: white !important; color: black !important; }
      header, footer, button, .print-hidden { display: none !important; }
      .shadow-sm, .shadow-md { box-shadow: none !important; }
      .print-card { border: 2px solid #cbd5e1 !important; background-color: #fff !important; }
    }
  </style>
</head>
<body class="bg-slate-50/50 min-h-screen text-slate-800 antialiased flex flex-col select-none">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const QUADRANTS = [
      { id: 1, name: 'Self Awareness & Regulation Matrix', englishName: 'PART 1', description: 'Rata-rata Kuadran: 7.3 / 10.0 (Rentang Skor Valid per Pilar: 5.0 - 10.0)' }
    ];

    const QUESTIONS = [
      // --- PILLAR 1 ---
      { id: 1, quadrant: 1, pillar: 1, text: 'Emosi saya umumnya', options: [{ text: 'Memiliki dampak yang besar pada cara saya berperilaku.', score: 1 }, { text: 'Hampir tidak berdampak pada cara saya berperilaku.', score: 0.5 }] },
      { id: 2, quadrant: 1, pillar: 1, text: 'Saya umumnya dipandu oleh', options: [{ text: 'Tujuan dan nilai-nilai saya.', score: 1 }, { text: 'Tujuan dan nilai-nilai lainnya.', score: 0.5 }] },
      { id: 3, quadrant: 1, pillar: 1, text: 'Saat saya berada di bawah tekanan, saya biasanya memiliki', options: [{ text: 'Mengubah perilaku dari biasanya.', score: 1 }, { text: 'Perilaku yang tetap tidak berubah.', score: 0.5 }] },
      { id: 4, quadrant: 1, pillar: 1, text: 'Saya umumnya belajar paling banyak', options: [{ text: 'Dengan melakukan aktivitas secara aktif.', score: 0.5 }, { text: 'Dari refleksi atas pengalaman masa lalu.', score: 1 }] },
      { id: 5, quadrant: 1, pillar: 1, text: 'Saya umumnya', options: [{ text: 'Saya memiliki selera humor yang baik tentang diri saya sendiri.', score: 1 }, { text: 'Menganggap diri saya serius.', score: 0.5 }] },
      { id: 6, quadrant: 1, pillar: 1, text: 'Saya memperkenalkan diri.', options: [{ text: 'Dengan rasa percaya diri dan memiliki "kharisma".', score: 0.5 }, { text: 'With a degree of humility and caution.', score: 1 }] },
      { id: 7, quadrant: 1, pillar: 1, text: 'Di mana pun ada ketidakpastian dan tekanan, saya selalu', options: [{ text: 'Tegas dan mengambil keputusan yang tepat.', score: 0.5 }, { text: 'Berhati-hati dalam mengambil keputusan yang tepat.', score: 1 }] },
      { id: 8, quadrant: 1, pillar: 1, text: 'Saya selalu menyuarakan pandangan bahwa', options: [{ text: 'Tidak populer dan berani mengambil risiko demi kebenaran.', score: 1 }, { text: 'Sebagian besar orang lain setuju dan mendukungnya.', score: 0.5 }] },
      { id: 9, quadrant: 1, pillar: 1, text: 'Saya selalu suka', options: [{ text: 'Menghadapi tantangan baru.', score: 1 }, { text: 'Mempertahankan status quo.', score: 0.5 }] },
      { id: 10, quadrant: 1, pillar: 1, text: 'Saya umumnya', options: [{ text: 'Menumbuhkan kepercayaan pada orang lain.', score: 1 }, { text: 'Mengandalkan kepercayaan orang lain.', score: 0.5 }] },

      // --- PILLAR 2 ---
      { id: 11, quadrant: 1, pillar: 2, text: 'Saya umumnya', options: [{ text: 'Mengendalikan emosi dan dorongan impulsif saya yang mengganggu.', score: 1 }, { text: 'Membiarkan emosi dan suasana hati saya mempengaruhi perilaku saya.', score: 0.5 }] },
      { id: 12, quadrant: 1, pillar: 2, text: 'Saat saya berada di bawah tekanan', options: [{ text: 'Saya berpikir jernih dan tetap fokus.', score: 1 }, { text: 'Saya mudah teralihkan perhatiannya oleh hal-hal lain.', score: 0.5 }] },
      { id: 13, quadrant: 1, pillar: 2, text: 'Saya selalu', options: [{ text: 'Hanya melakukan apa yang harus saya lakukan.', score: 0.5 }, { text: 'Lakukan seperti yang kukatakan akan kulakukan.', score: 1 }] },
      { id: 14, quadrant: 1, pillar: 2, text: 'Kepercayaan dari orang lain', options: [{ text: 'Dimenangkan berdasarkan keandalan dan keaslian.', score: 1 }, { text: 'Diberikan kepada saya secara otomatis.', score: 0.5 }] },
      { id: 15, quadrant: 1, pillar: 2, text: 'Saya selalu', options: [{ text: 'Mampu melihat peristiwa apa adanya.', score: 0.5 }, { text: 'Fleksibel dalam cara saya melihat peristiwa.', score: 1 }] },
      { id: 16, quadrant: 1, pillar: 2, text: 'Saat situasi berubah, saya selalu', options: [{ text: 'Bekerja keras untuk mencoba memenuhi tuntutan tersebut.', score: 0.5 }, { text: 'Menangani berbagai tuntutan dan prioritas yang berubah-ubah dengan lancar.', score: 1 }] },
      { id: 17, quadrant: 1, pillar: 2, text: 'Saya selalu', options: [{ text: 'Menetapkan tujuan yang menantang bagi diri saya sendiri.', score: 1 }, { text: 'Menyelesaikan tujuan yang telah ditetapkan untuk saya.', score: 0.5 }] },
      { id: 18, quadrant: 1, pillar: 2, text: 'Ketika hambatan dan kemunduran terjadi dalam mengejar tujuan saya, saya selalu', options: [{ text: 'Tetaplah berupaya mencapai tujuan meskipun apa pun yang telah terjadi.', score: 1 }, { text: 'Menyesuaikan kembali tujuan dan/atau harapan.', score: 0.5 }] },
      { id: 19, quadrant: 1, pillar: 2, text: 'Secara umum, saya', options: [{ text: 'Mengejar tujuan di luar apa yang diduga atau diharapkan dari saya.', score: 1 }, { text: 'Mengejar tujuan hanya sejauh yang dituntut dari saya.', score: 0.5 }] },
      { id: 20, quadrant: 1, pillar: 2, text: 'Ketika saya mengidentifikasi peluang, saya selalu', options: [{ text: 'Proaktif dalam mengejar peluang tersebut.', score: 1 }, { text: 'Ragu apakah akan mengejar kesempatan tersebut.', score: 0.5 }] }
    ];

    function App() {
      const [appState, setAppState] = useState('QUESTIONS');
      const [answers, setAnswers] = useState({});

      const handleAnswerChange = (qId, data) => { setAnswers(prev => ({ ...prev, [qId]: data })); };
      const isAllAnswered = QUESTIONS.every(q => answers[q.id] !== undefined);

      if (appState === 'RESULTS') {
        let p1 = 0, p2 = 0;
        QUESTIONS.forEach(q => {
          if (q.pillar === 1) p1 += answers[q.id]?.score || 0;
          if (q.pillar === 2) p2 += answers[q.id]?.score || 0;
        });
        const totalScore = p1 + p2;

        return (
          <div className="max-w-6xl mx-auto my-6 p-4 w-full space-y-6">
            <div className="bg-white rounded p-6 md:p-8 space-y-6 border border-slate-200">
              <div className="flex justify-between items-center border-b pb-4">
                <div>
                  <span className="text-xs font-bold uppercase text-indigo-600 bg-indigo-50 px-2 py-1 rounded">OFFICIAL COMPETENCY REPORT — PART 1</span>
                  <h1 className="text-2xl font-bold text-slate-900 mt-1">{QUADRANTS[0].name}</h1>
                  <p className="text-xs text-slate-500 mt-1">Nama: <span className="font-bold text-slate-700">Internal Participant</span> &bull; Dept: <span className="font-bold text-slate-700">Marcom</span></p>
                </div>
                <div className="flex gap-2 print-hidden">
                  <button onClick={() => window.print()} className="px-4 py-2 bg-slate-100 border text-xs font-bold rounded hover:bg-slate-200 cursor-pointer">Export Report (PDF)</button>
                  <button onClick={() => { setAnswers({}); setAppState('QUESTIONS'); }} className="px-4 py-2 bg-slate-900 text-white text-xs font-bold rounded hover:bg-slate-800 cursor-pointer">Reset Tes</button>
                </div>
              </div>

              <div className="bg-[#FFFF00] border-2 border-slate-900 p-8 text-center rounded print-card">
                <span className="text-xs font-bold tracking-widest uppercase block text-slate-800">PART 1 CUMULATIVE SCORE</span>
                <div className="text-5xl font-black font-mono mt-1 text-slate-900">{totalScore.toFixed(1)} <span className="text-2xl font-sans font-normal text-slate-600">/20.0</span></div>
                <p className="text-xs font-bold text-slate-900 mt-4">{QUADRANTS[0].description}</p>
              </div>

              <div className="border border-amber-200 bg-amber-50/50 p-4 rounded">
                <span className="text-xs font-bold tracking-wider text-amber-800 uppercase block">Personalised Insight</span>
                <p className="text-xs text-slate-700 mt-1 font-medium">Evaluasi menunjukkan performa rata-rata pada pilar utama. Diperlukan fokus peningkatan berkala pada pengendalian stres serta adaptasi situasional agar performa kerja marcom tetap konsisten di berbagai unit hotel.</p>
              </div>

              <div className="space-y-2">
                <span className="text-xs font-bold uppercase tracking-wider text-slate-400 block">Breakdown Skor Per Pilar Kompetensi</span>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div className="p-4 rounded border bg-white print-card space-y-2">
                    <div className="flex justify-between items-center text-xs">
                      <div>
                        <span className="text-[10px] text-slate-400 font-bold uppercase block">Pillar 1</span>
                        <span className="font-bold text-slate-800">Self-Awareness</span>
                      </div>
                      <span className="px-2 py-0.5 bg-indigo-50 text-indigo-600 font-bold rounded text-[10px]">Average</span>
                    </div>
                    <div className="text-xl font-bold font-mono text-indigo-600">{p1.toFixed(1)}/10.0</div>
                    <div className="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                      <div className="bg-indigo-600 h-1.5 rounded-full" style={{ width: `${(p1/10)*100}%` }}></div>
                    </div>
                  </div>

                  <div className="p-4 rounded border bg-white print-card space-y-2">
                    <div className="flex justify-between items-center text-xs">
                      <div>
                        <span className="text-[10px] text-slate-400 font-bold uppercase block">Pillar 2</span>
                        <span className="font-bold text-slate-800">Self-Regulation</span>
                      </div>
                      <span className="px-2 py-0.5 bg-sky-50 text-sky-600 font-bold rounded text-[10px]">Good</span>
                    </div>
                    <div className="text-xl font-bold font-mono text-sky-600">{p2.toFixed(1)}/10.0</div>
                    <div className="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                      <div className="bg-sky-600 h-1.5 rounded-full" style={{ width: `${(p2/10)*100}%` }}></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="max-w-4xl mx-auto my-6 p-4 w-full">
          <div className="bg-white rounded border border-slate-200 shadow-sm overflow-hidden">
            <div className="bg-slate-50 border-b px-6 py-3 flex justify-between items-center text-xs text-slate-500 font-medium">
              <span>The Global Emotional Intelligence Test — Part 1</span>
              <span>Progress: {Math.round((Object.keys(answers).length / QUESTIONS.length) * 100)}%</span>
            </div>
            <div className="divide-y divide-slate-100">
              {QUESTIONS.map(q => (
                <div key={q.id} className="p-6 space-y-3">
                  <p className="text-sm font-medium text-slate-800">{q.id}. {q.text}</p>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-2 pl-4">
                    {q.options.map((opt, oIdx) => {
                      const isSelected = answers[q.id]?.index === oIdx;
                      return (
                        <button key={oIdx} onClick={() => handleAnswerChange(q.id, { index: oIdx, score: opt.score })} className={`p-3 text-left text-xs rounded border transition-all cursor-pointer ${isSelected ? 'bg-slate-900 text-white border-transparent font-medium shadow-sm' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}>
                          {opt.text}
                        </button>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
            <div className="p-4 bg-slate-50 border-t flex justify-end">
              <button disabled={!isAllAnswered} onClick={() => { setAppState('RESULTS'); window.scrollTo(0,0); }} className="px-6 py-2 bg-slate-900 text-white rounded text-xs font-semibold disabled:opacity-30 disabled:cursor-not-allowed cursor-pointer">
                Lihat Hasil Analisa Matrix
              </button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
